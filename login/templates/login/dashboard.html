{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Óptica</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f6f9;
    }

    /* HEADER */
    .header {
        background-color: #1e2a38;
        color: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header h1 {
        margin: 0;
        font-size: 20px;
    }

    .header a {
        color: #ff6b6b;
        text-decoration: none;
        font-weight: bold;
    }

    /* CONTENIDO */
    .container {
        padding: 30px;
    }

    .top-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    input[type="text"] {
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
        width: 200px;
    }

    button {
        padding: 8px 15px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-search {
        background-color: #3498db;
        color: white;
    }

    .btn-new {
        background-color: #2ecc71;
        color: white;
        margin-left: auto;
    }

    /* TABLA */
    table {
        width: 100%;
        border-collapse: collapse;
        background-color: white;
        border-radius: 8px;
        overflow: hidden;
    }

    th {
        background-color: #2c3e50;
        color: white;
        padding: 10px;
        text-align: left;
    }

    td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
    }

    tr:hover {
        background-color: #f1f1f1;
        cursor: pointer;
    }

</style>
</head>

<body>

<div class="header">
    <h1>Óptica - Sistema Clínico</h1>
    <div>
        Bienvenido {{ request.user.username }} |
        <a href="{% url 'logout' %}">Cerrar sesión</a>
    </div>
</div>

<div class="container">

    <div class="top-bar">
        <input type="text" placeholder="Buscar por nombre">
        <input type="text" placeholder="Buscar por RUT">
        <button class="btn-search">Buscar</button>
        <button class="btn-new">+ Nuevo Paciente</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>RUT</th>
                <th>Teléfono</th>
                <th>Ver</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Juan Pérez</td>
                <td>12.345.678-9</td>
                <td>987654321</td>
                <td>🔎</td>
            </tr>
            <tr>
                <td>María Soto</td>
                <td>11.222.333-4</td>
                <td>912345678</td>
                <td>🔎</td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
